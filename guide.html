<script>
const CHAPTERS=[{"id": 1, "title": "Fall of a Hero", "area": "Nibelheim (Flashback)", "party": "Cloud + Sephiroth (temporary)", "summary": "A 5-year flashback. You're Cloud alongside Sephiroth surveying the Nibel Mako Reactor. The chapter teaches core combat mechanics. Everything you collect here disappears when the flashback ends — use it all freely.", "note": "⚠️ All items & materia found in Ch.1 are LOST at chapter end. This is a flashback. Use everything freely.", "warn": null, "decisions": [{"text": "Demo skip prompt: no consequence either way — both routes play out identically.", "imp": false}, {"text": "Visit Cloud's Mom's house (NE), climb the water tower, and try Tifa's house before the mission for backstory context.", "imp": false}, {"text": "Tifa's house: grab the Ether from the chest in the far room upstairs. Try the piano — Cloud remembers this later.", "imp": false}], "items": [{"name": "Ether", "type": "c", "miss": false, "when": "During free roam in Nibelheim town before the mountain mission.", "how": "Head to Tifa's house (south of water tower). Go upstairs and open the chest in the far back room."}, {"name": "Wind Materia", "type": "p", "miss": false, "when": "After following Tifa up the mountain and hitting a dead end — bridge is out, she calls you back.", "how": "As you turn around to backtrack, look RIGHT. There's a ledge above you. Climb up to grab the glowing orb. Equip it immediately."}, {"name": "Level Boost Materia", "type": "p", "miss": false, "when": "Sephiroth opens a locked Shinra facility door and you head inside for the first time.", "how": "Up the stairs inside the entrance. Before taking the elevator, turn immediately RIGHT — materia is in a small alcove on the ground."}, {"name": "Empowerment Materia", "type": "p", "miss": false, "when": "In the cave section 'Beware the Gas' — toxic gas clouds on the floor, large stone pillar in the center.", "how": "Don't go straight. Hug the RIGHT wall and circle around the big pillar to the dead-end alcove. Materia is on the ground there."}, {"name": "Magnify Materia", "type": "p", "miss": false, "when": "After crossing wooden planks built along the side of a cliff.", "how": "Look down and to your LEFT — there's a lower ledge below the path. Drop down to it. Materia is there. Climb back up via nearby handholds."}, {"name": "Mega-Potion", "type": "c", "miss": false, "when": "After defeating the Zu — the large bird miniboss on the upper cliffs.", "how": "Head up the stairs immediately ahead. Chest is on the LEFT side of the stairs."}, {"name": "Precision Defense Focus Materia", "type": "p", "miss": false, "when": "Right after the Zu fight and Mega-Potion chest. Path splits: right = objective, left = small climb.", "how": "Go LEFT first. Climb the ledges. Materia is at the top. Then come back and go right. Extends perfect block window — very useful."}, {"name": "Auto-cast Materia", "type": "p", "miss": false, "when": "After climbing the longest vertical ladder in the chapter.", "how": "At the very top, look immediately LEFT before going anywhere else. Materia is right there. Easy to miss if you walk straight."}, {"name": "Comet Materia", "type": "c", "miss": false, "when": "After the second Mako gas puzzle — drag machine through big door to clear cloud clusters near elevator.", "how": "Before stepping into the elevator, walk to the NORTHWEST edge of the platform. Drop off the side. Break the box stack below. Comet Materia is inside."}, {"name": "2x Elixir", "type": "c", "miss": false, "when": "On the path after Comet Materia, heading toward the final boss arena.", "how": "Two chests along the path before the rest bench before the boss. Open both. Then use the bench."}], "bosses": [{"name": "Materia Guardian", "weakness": "Fire", "tips": ["Hit with physical attacks + Fire spells whenever ATB allows.", "Watch for Hindlegs grab — dodge with Circle, or switch to Sephiroth and hit the Hindleg to free Cloud and Pressure the boss.", "After ~half health it climbs the ceiling. Target its legs to knock it back to the floor and trigger Pressure.", "When game prompts Double Helix — use it ONLY when boss is about to cast Trine. Don't waste it early.", "Finish with your Limit Break."]}], "tips": ["Triple Slash hits multiple enemies — your best move all chapter.", "Use Assess on every new enemy type — unlocks Chadley's VR missions later.", "Zu is weak to Wind. Use Aero to stagger quickly.", "Sephiroth is extremely powerful — swap to him in tough spots."], "sideQuests": []}, {"id": 2, "title": "A New Journey Begins", "area": "Kalm / Grasslands", "party": "Cloud, Aerith, Tifa, Barret, Red XIII", "summary": "The team wakes up in Kalm. Free time to explore, build relationships, and learn game systems. Then escape into the open-world Grasslands and reach Bill's Chocobo Ranch where your mount system unlocks.", "note": "🔑 Party member conversations here affect a major scene in Ch.12. Every speech bubble over a party member = a relationship opportunity. Don't skip any.", "warn": null, "decisions": [{"text": "Aerith invites you to the clock tower — respond however you like. Your answer affects her relationship meter.", "imp": true}, {"text": "In Kalm: find Tifa at Mako Tank Plaza ('This tank remind you of anything?' → 'The place I made that promise to you.' ★★★), Barret at the Rusty Arrow pub ('First one's on me.' ★★★), Red XIII near west border ('I knew I could count on you.' ★★★).", "imp": true}, {"text": "DON'T buy Cloud's weapon at the weapon shop — you get the Sleek Saber FREE near the Abandoned Dock shortly. Save your gil.", "imp": true}, {"text": "Finish everything in Kalm before heading to the clock tower — you can't easily return for a while.", "imp": false}], "items": [{"name": "Queen's Blood Starter Deck", "type": "r", "miss": false, "when": "Automatically when you first leave the inn room at the start of Ch.2.", "how": "It's handed to you. Check inventory and learn the basics — use it to challenge players around town."}, {"name": "QB Card: Crystalline Crab (013)", "type": "r", "miss": false, "when": "While exploring Kalm — just outside the inn entrance.", "how": "Challenge Ned standing right outside the Kalm Inn door. Win Queen's Blood match."}, {"name": "QB Card: Cactuar (012)", "type": "r", "miss": false, "when": "Still in Kalm, southern part of town.", "how": "Find Nene on a raised platform slightly south of the town center. Challenge and beat her."}, {"name": "QB Pack: Suppressive Strikers (4 cards)", "type": "b", "miss": false, "when": "Any time during Kalm exploration — before leaving town.", "how": "Item Vendor on the EAST side of the river in Kalm. Buy for 500 gil. Contains: Riot Trooper, Toxirat, Devil Rider, Flan."}, {"name": "QB Pack: Ruffians (4 cards)", "type": "b", "miss": false, "when": "Same vendor — buy both packs while you're there.", "how": "Same Kalm Item Vendor, east side of river. 500 gil. Contains: Genadier, Mandragora, Quetzalcoatl, Zu."}, {"name": "QB Card: Screamer (017)", "type": "r", "miss": false, "when": "Still in Kalm — northeast corner of town, slightly hidden.", "how": "NE corner near the river. Bridge above, red ladder going down. Climb down to find Zahira at lower riverside. Beat her."}, {"name": "Item Transmuter", "type": "r", "miss": false, "when": "During the escape sequence — Shinra troops appear, innkeeper Broden leads you over rooftops.", "how": "Can't miss this. After Broden leads you back through the hidden route, he hands it to you."}, {"name": "Sleek Saber (Cloud weapon — FREE)", "type": "c", "miss": false, "when": "After leaving Kalm through the underground tunnel into the Grasslands — approaching the Abandoned Dock.", "how": "As you near the dock building, scan the area. Purple chest near the dock structure. Open it BEFORE entering the dock."}, {"name": "Aureate Pinion (accessory)", "type": "c", "miss": false, "when": "After the dock cutscene — directed to Bill's Chocobo Ranch, automatically speak with Bill out front.", "how": "Before entering the barn, walk around to the BACK of the ranch building. Chest is tucked behind it."}, {"name": "Timeless Rod (Aerith weapon)", "type": "c", "miss": false, "when": "Inside Bill's barn — sent to find Chloe near the back.", "how": "Look to Chloe's IMMEDIATE RIGHT — purple chest right next to her. Grab it before speaking to her."}, {"name": "Moogle Medal", "type": "c", "miss": false, "when": "Still inside Bill's barn, right after finding Chloe.", "how": "Find the ladder in the barn and climb to the upper loft. Chest is up there. Moogle Medals buy exclusive items at Moogle Emporiums — save them."}], "bosses": [], "tips": ["Folio system unlocks here — visit Maghnata Books in Kalm when prompted. Spend SP to upgrade each character.", "Vending machines often have orange-highlighted discounted items — always buy those.", "Chocobo wrangling: First Chocobo faces right (sneak left). Second rotates — wait in flowers until it faces left, then move. For Piko, grab a rock, aim behind it with L1, throw to make Piko turn, then sneak up.", "QB is not just a mini-game — some late-game rewards are locked behind it. Challenge every opponent you find."], "sideQuests": [{"name": "Flowers from the Hill", "char": "ae", "start": "Bill's Chocobo Ranch — speak to Chloe after unlocking the ranch during the main story.", "how": "Travel to Wildflower Plateau, defeat Mandragoras, collect flowers from 3 fields. Best picks: Red Gerberas, Yellow Calendulas, White Daisies. Return to Chloe.", "reward": "Telluric Scriptures Vol. I (Aerith SP)", "req": null, "note": null}, {"name": "A Rare Card Lost", "char": "ti", "start": "Kalm bar (the Rusty Arrow). Speak to bartender Vash.", "how": "Beat Vash at Queen's Blood → challenge Virgil → challenge Thorin (card vendor outside town) → return to Vash.", "reward": "QB Card #107: Chocobo & Moogle", "req": null, "note": "Good early deck builder — complete before leaving Kalm."}, {"name": "Lifeline in Peril", "char": "ba", "start": "Kalm notice board (after the road back to Kalm unlocks). Assigned by the Mayor.", "how": "Visit Maintenance Warehouse southwest of town entrance. Meet Kyrie, gather 4 items at marked locations, return to Kyrie, fight a Noxicap at the work site.", "reward": "3,000 Gil", "req": null, "note": null}, {"name": "Livestock's Bane", "char": "re", "start": "Oliver's Farm, near Bill's Ranch. Speak to the farmer.", "how": "Mount your Chocobo to pick up a scent trail, follow it to the coast, defeat the White Terror fiend.", "reward": "Owl Bracer accessory", "req": null, "note": null}, {"name": "Where the Wind Blows", "char": "re", "start": "Kalm Inn — speak to Broden or another staffer. REQUIRES Livestock's Bane first.", "how": "Visit Windmill Settlement, speak to Mildred. Craft a Windmill Gear via Item Transmutation — requires an Excavation Intel node for the recipe AND defeating Quetzalcoatl (Classified Fiend Hunt) for materials. Activate the windmill.", "reward": "Whistlewind Scarf accessory", "req": "Livestock's Bane", "note": "Requires Excavation Intel + killing Quetzalcoatl. Complete Grasslands World Intel first."}]}, {"id": 3, "title": "Deeper into Darkness", "area": "Mithril Mines", "party": "Cloud/Tifa/Aerith → then Barret/Red XIII", "summary": "The party follows black-robed figures into the Mithril Mines. The party splits midway — you play Cloud's trio first, then switch to Barret and Red XIII. Boss fight is Elena and Rude from the Turks.", "note": "🔑 The party splits about halfway through. Move Materia to Barret/Red XIII BEFORE that happens. Once split, you lose access to Cloud's loadout until chapter end.", "warn": null, "decisions": [{"text": "Mine cart track puzzle: push the cart WITHOUT flipping the switch first. This opens the LEFT path to a chest. After grabbing it, push the cart back, flip the switch, then push it the correct way.", "imp": true}, {"text": "When you switch to Barret/Red XIII: immediately open equipment and reassign Materia — especially Assess.", "imp": true}], "items": [{"name": "AP Up Materia", "type": "p", "miss": false, "when": "Early in the mines — shortly after entering you hit a fork in the path.", "how": "Right path leads across a platform where the materia sits. Or drop down from the fork and take the ladder up. Both routes work."}, {"name": "Sylph Gloves (Tifa weapon)", "type": "c", "miss": false, "when": "After dealing with the first Crawlers and grabbing AP Up — working toward the first story objective.", "how": "Chest is along the main path toward the objective marker. Follow the route — make sure to open it rather than running past."}, {"name": "Ether", "type": "c", "miss": false, "when": "After dropping into a large open cavern — notably bigger than the corridors before it.", "how": "Before taking the right-side path out of the cavern, deal with the Crawlers inside. Chest is right there near them."}, {"name": "3x Iron Ore", "type": "c", "miss": false, "when": "In a large room where path splits — upper route has an Ogre, lower route goes through water. Flying Archdragons guard a side area.", "how": "Optionally fight the Archdragon on the left side (use Aero to stagger it). Chest with Iron Ore is right there after."}, {"name": "3x Hi-Potion", "type": "c", "miss": false, "when": "You reach a structure with a broken ladder — the game calls this 'Ticket Out of Here.' Crawlers guard the area.", "how": "After dealing with the Crawlers, look for the chest sitting right beside the broken structure."}, {"name": "3x Lea Titanium", "type": "c", "miss": false, "when": "After the mine cart ladder fix, you cross a bridge and reach a junction — stairs go up, lower path drops left.", "how": "Drop DOWN to the left off the bridge. Chest with Lea Titanium at the bottom. Take the nearby ladder back up."}, {"name": "MP Up Materia", "type": "p", "miss": false, "when": "Barret/Red XIII section — you reach a large room with water on the floor. Main route goes up and left.", "how": "Go DOWN into the water first. Head to the SOUTHEAST dead end. Materia is sitting at the back."}, {"name": "Bulletproof Vest (accessory)", "type": "c", "miss": false, "when": "Barret/Red section — mine cart on tracks with a split and a switch in the middle.", "how": "Push the cart WITHOUT touching the switch — it goes left, where the chest is. Open it. Then push cart back, flip switch, push it the other way."}, {"name": "Renegarde's Collar (Red XIII weapon)", "type": "c", "miss": false, "when": "Immediately after the Elena and Rude boss fight ends — a rest spot appears.", "how": "Look RIGHT next to the rest point. Purple chest is right beside it. Equip on Red XIII immediately."}], "bosses": [{"name": "Elena & Rude (Turks)", "weakness": "Wind (Rude) / Lightning (Elena)", "tips": ["Keep Aerith in your party — set up a Ward and use Pray or Cure to keep Cloud and Tifa healthy.", "Focus one boss at a time. Take Rude first (more HP). Stagger him with Wind (Aero), then Elena with Lightning.", "When they've lost ~a third of health they launch unblockable synergy attacks. Back off and dodge.", "Use Cloud's Counterstance whenever you have a window — strong punish damage.", "Last time you use Cloud/Tifa/Aerith this chapter. Spend all their MP freely."]}], "tips": ["Crawlers are weak to Fire. Crystalline Crabs are weak to Ice. Right element = much faster staggers.", "Ogres can be Pressured by blocking their club swings — great for practicing Perfect Blocks.", "Flan (Barret/Red section) resist all physical attacks. Use Fire magic — they also drop MP refills when defeated.", "Keep using Assess on every new enemy type."], "sideQuests": []}, {"id": 4, "title": "Dawn of a New Era", "area": "Junon", "party": "Cloud, Aerith, Tifa (+ Yuffie joins mid-chapter)", "summary": "The group arrives in the Junon region. Explore Under Junon, save a girl named Priscilla from a sea monster, spend a night at the inn building relationships, then infiltrate Upper Junon disguised as Shinra infantry. Yuffie joins your party here.", "note": "🔑 Do ALL Under Junon side content and World Intel BEFORE agreeing to Priscilla's plan. You'll be locked out of the lower area for a significant stretch.", "warn": null, "decisions": [{"text": "Inn hallway: interact with EVERY party member's door. Each is a relationship opportunity. Aerith's door → listen to the mysterious conversation, then enter, interact AGAIN to speak to her. Purple chest inside!", "imp": true}, {"text": "Aerith prompt: 'Do you remember the first time we met?' → 'You shoved a flower at my face.' ★★★", "imp": true}, {"text": "Tifa prompt: 'Do you remember a guy named Emilio?' → 'Only person from the village I remember is you.' ★★★", "imp": true}, {"text": "Parade infiltration: match drill commands on screen. Better timing = better grade. Performing well gives Tifa and Aerith relationship points.", "imp": false}], "items": [{"name": "HP Up Materia", "type": "p", "miss": false, "when": "Right after the Terror of the Deep boss fight — Cloud washes up on shore during a cutscene.", "how": "After regaining control on the beach, don't immediately head back to the village. Scan the SHORELINE NEARBY — the materia is on the beach not far from where Cloud lands."}, {"name": "Empress's Scepter (Aerith weapon)", "type": "c", "miss": false, "when": "During the inn stay — after you overhear Aerith talking in her room and enter to check on her.", "how": "Once inside Aerith's room, look for the purple chest. It's inside the room. Grab it before speaking with her."}, {"name": "Lightning Materia", "type": "p", "miss": false, "when": "During the inn stay — after speaking to everyone on the ground floor and heading upstairs, past the automatic Tifa moment.", "how": "Continue to the VERY LAST ROOM at the end of the upstairs hallway. Fireplace inside — Lightning Materia is sitting beside it. Equip immediately; your next boss is weak to it."}], "bosses": [{"name": "Terror of the Deep", "weakness": "Lightning", "tips": ["Keep Aerith in your party — essential for party healing and breaking Water Cells with her magic-based basic attack.", "Hit the head with Lightning spells to quickly build Pressure. Once Pressured, switch to strongest physical abilities.", "Water Cell trap: use Aerith's basic attack (counts as magic) or a spell. Physical barely dents it.", "Oceanic Tornado: move to the FAR EDGE of the arena immediately when it winds up. After the main tornado, dodge small water spouts shooting through the floor.", "Claw grab: attack the Tail Fin right away — ignore it and the grabbed character is instantly killed.", "Aerith: when not healing, drop an Arcane Ward and double-cast Lightning for major damage."]}, {"name": "Roche", "weakness": "None — pressure through abilities", "tips": ["Fast, aggressive boss on a motorcycle. Tifa's Unbridled Strength combos build stagger quickly.", "When Roche charges a big attack, dodge SIDEWAYS (not backward) and punish during his recovery window.", "Save Limit Breaks for stagger windows — damage multiplier is highest then."]}], "tips": ["Complete all 24 World Intel in Junon before leaving — they unlock Chadley's summon VR battles.", "'Stuck in a Rut' side quest unlocks Chocobo Carriage fast travel between all regions. Make it your first priority.", "Junon has 5 side quests — they unlock after the inn night when you return to Under Junon in the morning."], "sideQuests": [{"name": "Stuck in a Rut", "char": "ae", "start": "Gabe's Ranch in the Junon region. Complete the local Chocobo Intel node first if prompted.", "how": "Tame Belle the wall-climbing Mountain Chocobo, find Wainwright's Hut via cliff-climbing, retrieve 3 Dried Driftwood pieces at marked locations, return to Gabe.", "reward": "Queensguard Bangle + UNLOCKS CHOCOBO CARRIAGE FAST TRAVEL between all regions", "req": null, "note": "🔑 Do this first in Junon — Chocobo Carriage travel unlock is essential."}, {"name": "When Words Won't Do", "char": "re", "start": "Under Junon — Rhonda, the area's unofficial chief.", "how": "Follow Rhonda's dog Salmon eastward to Crow's Nest settlement on foot or Chocobo. Fight small groups along the way, finish with two Sandstorm Drakes.", "reward": "Mythril Ore, Ruby, Sharpshooter's Companion Vol. I", "req": null, "note": "PREREQUISITE for both The Hardest Sell and Dreaming of Blue Skies."}, {"name": "The Hardest Sell", "char": "re", "start": "Crow's Nest — speak to Toby. REQUIRES When Words Won't Do first.", "how": "Head to the Abandoned Lighthouse south of Crow's Nest. Multi-wave battle — final wave has two White Mousse enemies.", "reward": "Merc Chocobo Gear Set", "req": "When Words Won't Do", "note": null}, {"name": "Dreaming of Blue Skies", "char": "ti", "start": "Crow's Nest notice board — speak to Colin at Condor Hill. REQUIRES When Words Won't Do first.", "how": "Track a cow with your Chocobo, fight a Mystic Dragon. Then choose your food source — select BOVINE MEAT from the cow for the best photograph result.", "reward": "Well-Composed Condor Photograph, Warding Materia", "req": "When Words Won't Do", "note": "Choose 'Bovine meat from the cow' for the best result and full Tifa relationship boost."}, {"name": "Calling All Frogs", "char": "ti", "start": "Under Junon eastern beachfront — speak to Finn, a youth near where you met Priscilla.", "how": "Fight enemies while affected by the Toad status (use Leapfrog ability). Then play Jump Frog - Whirligig Whack minigame on a rotating obstacle course. Any rank completion finishes the quest.", "reward": "Enfeeblement Rings, Jump Frog minigame unlocked", "req": null, "note": "PREREQUISITE for Tides of War and Worry in Ch.12."}]}, {"id": 5, "title": "Blood in the Water", "area": "Shinra-8 Cruise Ship", "party": "Cloud, Aerith, Tifa, Barret, Red XIII", "summary": "The party boards the Shinra-8 cruise ship. There's a Queen's Blood tournament you must win at least once for a trophy. Partway through, monsters attack — the party splits as you fight through the ship. Boss is Jenova Emergent.", "note": "🔑 The QB tournament on the ship is required at least once for the Card Royalty trophy. Winning also unlocks QB Card 095 Ifrit — one of the best cards in the game.", "warn": null, "decisions": [{"text": "Chat with each party member at the counter BEFORE the tournament starts — relationship interaction moments for all of them.", "imp": true}, {"text": "QB Tournament: speak to the 'Forfeit' attendant to skip to the final round at any time. But you MUST win it at least once for the trophy.", "imp": false}], "items": [{"name": "Fortification Materia", "type": "p", "miss": false, "when": "After chatting with all party members at the tournament counter — before the tournament actually begins.", "how": "Exit through the SOUTH door (where Barret walks after you speak with him). The materia is just outside that door."}, {"name": "QB Card: 095 Ifrit", "type": "r", "miss": false, "when": "After winning the Queen's Blood Tournament on the ship.", "how": "Awarded automatically for winning the tournament. One of the best cards in the game."}, {"name": "2x Antidote", "type": "c", "miss": false, "when": "After the tournament — heading back downstairs to the sleeping quarters to rest.", "how": "Before interacting with the bed, open the chest in the sleeping quarters room."}, {"name": "Kaiser Knuckles (Tifa weapon)", "type": "c", "miss": false, "when": "In the ship's lower cargo hold — playing as Cloud and Tifa. You spot Barret across a room and jump down.", "how": "After defeating the two Daemonic Entity enemies, jump up the small ledge on the LEFT side of the room. Purple chest is on that higher platform."}, {"name": "Mega-Potion", "type": "c", "miss": false, "when": "Continuing through the cargo hold past the next group of enemies — you're meant to turn right to drop down.", "how": "Instead of dropping right, go UP the stairs to the LEFT. Chest is up there."}], "bosses": [{"name": "Jenova Emergent", "weakness": "No elemental weakness — use abilities", "tips": ["Use Barret's ranged attacks and Overcharge from a distance — getting close gets you hit by her laser ray.", "Once you Pressure Jenova, target her Head — disabling it massively boosts the Stagger bar.", "At ~1/3 health: Jenova starts bouncing around the map and spawns Shoulders — keep targeting them when they appear.", "At ~2/3 health: tentacles spawn around the arena. Use AoE to clear them but keep focus on Jenova and body parts.", "No elemental weakness — Poison her and focus on pressuring body parts."]}], "tips": ["Scrutineye enemies: you can't attack them unless they're actively attacking you. Wait for their attack animation then punish.", "Daemonic Entity: weak to Ice — easiest of the new ship enemies.", "Shrieker: same as Screamer from Ch.1 — block their swinging arm to Pressure them.", "Manual save after each tournament round in case of unexpected defeat."], "sideQuests": []}, {"id": 6, "title": "Fool's Paradise", "area": "Costa del Sol", "party": "Cloud + rotating date partner (based on relationship scores)", "summary": "Arrival at Costa del Sol — a beach resort. You'll earn beachwear for Cloud then the party, enjoy beach activities, fight a boss, then spend the evening with party members on the beach. Yuffie officially joins at the end. Your OUTFIT choice affects Tifa and Aerith relationship scores.", "note": "🔑 BEACHWEAR CHOICE affects relationship scores. Row 1: Cloud=Ocean Chocobo, Tifa=Majestic Glamour, Aerith=Floral Delight. Row 2: Cloud=Wild Surf, Tifa=Shining Spirit, Aerith=Pink Mermaid. Cloud matching Tifa's row gives Tifa points. Cloud matching Aerith's row gives Aerith points.", "warn": null, "decisions": [{"text": "Beachwear: pick your row deliberately based on who you want to boost (Tifa or Aerith relationship points).", "imp": true}, {"text": "Beach fight partner choice: pick Barret & Aerith OR Tifa & Red XIII. BOTH members of your chosen pair gain relationship points.", "imp": true}, {"text": "Evening beach conversations: Tifa → 'Lots happened since then.' ★★★. Aerith → 'They're just thoughts.' ★★★. Red XIII → 'Don't sweat it.' ★★★. Barret → 'You tried. That's all that matters.' ★★★.", "imp": true}, {"text": "Yuffie joining — respond: 'Beat it' then 'Kinda' then 'Hardly' then '...You can come with.' These counter-intuitive answers give the most relationship points.", "imp": true}], "items": [{"name": "Companion Cards (Beachwear currency)", "type": "r", "miss": false, "when": "After being told you need to buy beachwear — you need at least one card.", "how": "Complete either Card Carnival (speak to Regina on lower dock) or Pirate's Rampage (shooting gallery with Barret)."}], "bosses": [{"name": "Grasptropod", "weakness": "Lightning", "tips": ["Whichever party you pick, put Elemental-Lightning on Cloud's weapon — most of this fight ends up being just Cloud.", "Weak to Lightning — use Lightning spells to quickly Pressure and Stagger.", "Poison mist: move BACK and far away — it sprays in an arc or 360 degrees. Cure with Antidote or Chakra Materia.", "After Breakneck Spin: the boss overheats and becomes vulnerable. Pour everything into it during overheat.", "Synergy Skills will Pressure it and build ATB for both characters simultaneously."]}], "tips": ["Costa del Sol has new side quests available after the beach sections — check the map before leaving.", "The piano at the Royal Coast Concert counts toward a reward — play it.", "Completing Run Wild, Royal Coast Concert, Wheelie Rendezvous, or Cactuar Caper earns outfit tickets for Tifa and Aerith."], "sideQuests": [{"name": "The Saga of the Seaside Inn", "char": "yu", "start": "Johnny's Inn in Costa del Sol. Speak to Johnny.", "how": "Find 8 material bundles near zip line platforms. Get the Boiler Valve Part recipe from Excavation Intel 1 (Valve Factory Ruins), transmute it, hand to Johnny. FINAL STAGE (Ch.9+ only): Steal the Tonberry King's Crown in Southern Corel using the Buggy.", "reward": "QB Card #134: J-Squad, Johnny's Inn becomes a gallery and fast travel point", "req": null, "note": "⚠️ MULTI-CHAPTER — start now but cannot finish until Ch.9 when the Buggy unlocks Southern Corel."}, {"name": "Rendezvous in Costa del Sol", "char": "ae", "start": "Beach area of Costa del Sol — three girls on the beach after the beach sequence with the party.", "how": "Play two new minigame modes: Pirate Rampage: Ghost Ship (accuracy scored) and Run Wild: Time Trial (score goals in order). Then ride to Clamshell Beach, find a Gigantopod Shell (keep searching — it's the best result), return to the beach.", "reward": "The Art of Swordplay Vol. II (Cloud SP)", "req": null, "note": "After completing this quest, Rank 3 prizes for both minigame modes unlock — replay for best rewards."}, {"name": "Bodybuilders in a Bind", "char": "ti", "start": "Training Gym west of Costa del Sol — Jules and the Remake fitness crew. REQUIRES Rendezvous in Costa del Sol first.", "how": "Hunt and destroy 4 packs of fiends in the area. Then play the Crunch-Off minigame. Beat Amina (Basic) to complete the quest — keep going to beat Jules (Rank 3) for the Champion Belt.", "reward": "Crunch-Off minigame unlocked, Champion Belt (if you beat Jules)", "req": "Rendezvous in Costa del Sol", "note": null}]}, {"id": 7, "title": "Those Left Behind", "area": "Mt. Corel", "party": "Cloud, Aerith, Red XIII → Cloud, Tifa, Yuffie (midpoint)", "summary": "The party climbs Mt. Corel. The party splits partway up — Cloud goes with Aerith and Red first, then switches to Tifa and Yuffie's group. Bosses are Custom Valkyrie on the mountain and Dyne in North Corel.", "note": "🔑 Stop at the Chocobo Tack Shop on the way out of Costa del Sol and buy the Rent-a-Bird Membership (300 Gil) — lets you use a Chocobo between Costa del Sol and Mt. Corel.", "warn": null, "decisions": [{"text": "Mine cart route choice (with Yuffie/Barret/Tifa): Safer route gives Yuffie relationship points. Riskier route gives Barret points. Performing well in the minigame gives both points regardless.", "imp": true}, {"text": "Respond supportively to Barret throughout the Corel flashback — direct relationship stat moments.", "imp": true}], "items": [{"name": "Wizard's Rod (Aerith weapon) + Evenervation Materia", "type": "c", "miss": false, "when": "At the point where the party splits — Aerith and Red stay with Cloud. Rest spot is nearby.", "how": "Go LEFT of the rest spot. You'll find a purple chest with the Wizard's Rod AND an Evenervation Materia nearby."}, {"name": "MP Up Materia", "type": "p", "miss": false, "when": "Continuing up the mountain — you reach a metal structure with a yellow arrow pointing left. Instead, go RIGHT through the structure to a large side area.", "how": "Hug the right wall inside that side area. Find a small hole with stairs leading DOWN to a ledge. MP Up Materia is on that ledge."}, {"name": "3x Gold Dust", "type": "c", "miss": false, "when": "Still in the large right-side area — past some scaffolding.", "how": "Hug the right wall just past the scaffolding to a small dead end. Chest contains 3x Gold Dust."}, {"name": "Mythril Ore", "type": "c", "miss": false, "when": "Near a small path split — stairs go left (progress), or cross a small river.", "how": "Cross the small river to the other side. Chest containing Mythril Ore is there."}], "bosses": [{"name": "Custom Valkyrie", "weakness": "Lightning and Wind", "tips": ["You have Aerith and Red XIII (no Tifa) — save Synergy Abilities and Limits for the Stagger phase.", "Weak to TWO elements — use both Lightning and Wind spells/abilities to Pressure it quickly.", "Hard tip: equip Elemental-Fire on your ARMOR — nullifies most of its fire attacks. Put Lightning and Wind on Aerith.", "Watch for fire jets that leave burning spots on the ground — keep moving.", "Last combat section for Aerith and Red this chapter — use all their MP freely."]}, {"name": "Dyne", "weakness": "None — use your best abilities", "tips": ["Dodge his arm cannon blasts — they create lingering AoE fields on the ground. Move out of orange zones immediately.", "Pressure him by landing enough burst damage during attack recovery windows.", "He becomes more aggressive and erratic at low HP — save Limit Breaks for that phase.", "Tifa's Unbridled Strength combos build stagger quickly — lean on her for Pressure phases."]}], "tips": ["Sandhog Pie (main enemy) are weak to Ice — Snow Flurry and non-magic Ice commands clean them up fast.", "Heatseeker enemies (near the cable car) are weak to FIRE despite the name.", "Bagnadrana: immune to attacks from the rear. Attack during their Subdue attack or use Ice.", "Complete Corel region side quests before leaving for Chapter 8."], "sideQuests": [{"name": "Of Robed Men and Ransoms", "char": "re", "start": "North Corel — Dr. Sheiran's clinic. Unlocks after scaling Mt. Corel and arriving at North Corel.", "how": "Given a Ransom Note and UV-A Flashlight. Follow Red XIII tracking through Southern Corel — fight Landworm, Chimera, Sandspitter. Reach South Corel Mine, use UV-A Flashlight to follow footprints. Fight Dark Claw boss (block melee, dodge Reaper Claws).", "reward": "Tale of the Red Warrior Vol. II (Red XIII SP), Amethyst Collar weapon for Red XIII", "req": null, "note": "The Amethyst Collar is a free weapon upgrade for Red XIII — grab it."}]}, {"id": 8, "title": "All That Glitters", "area": "Gold Saucer / Corel Desert", "party": "Cloud, Aerith, Tifa, Barret, Red XIII, Yuffie, Cait Sith (joins here)", "summary": "The party arrives at the Gold Saucer. Cait Sith joins here. After exploring the park, a crisis occurs and Cloud ends up in the Corel Desert prison camp, where he must win a Chocobo Race to escape.", "note": "🔑 The visitor who greets Cloud at his hotel room is determined by your current highest relationship score — a preview of who your Ch.12 date will be.", "warn": null, "decisions": [{"text": "3D Brawler tutorial fight against Dio: you aren't required to win, but winning increases your relationship with Red XIII.", "imp": false}, {"text": "Barret gundown minigame during the buggy escape at chapter end: performing well gives Barret relationship points.", "imp": false}], "items": [{"name": "Healing Materia", "type": "p", "miss": false, "when": "Right at the start of the chapter — you follow the path from the ropeway into the Gold Saucer.", "how": "The path passes through a round staff room. The Healing Materia is sitting inside it — pick it up as you pass through."}, {"name": "Steadfast Block Materia", "type": "p", "miss": false, "when": "During 'Paint the Town Red' — heading back through Park Central after visiting one of the areas.", "how": "From Park Central, go up the stairs pointing to Speed Square. Cross the bridge to the RIGHT. The materia is on the ground there."}, {"name": "HP Up Materia", "type": "p", "miss": false, "when": "During your tour of the Gold Saucer — you visit Event Square (the Loveless theater area).", "how": "Go inside the theater and look near the STAGE. The HP Up Materia is on the ground near the stage."}, {"name": "Umbral Blade (Cloud weapon)", "type": "c", "miss": false, "when": "After the Gold Saucer crisis — Cloud follows a man toward the Chocobo Racing area in the Corel Desert.", "how": "On the way to meet the racing Chocobo, you'll SPOT a purple chest. Contains the Umbral Blade — the game basically points you at it."}], "bosses": [], "tips": ["Musclehead Colosseum (Battle Square) is the best early place to farm SP and materia AP — run it multiple times.", "Chocobo Racing: you need at least 3 Greens from the 6 Desert activities. Doing all 6 earns extra Chocobo accessories.", "GP earned from minigames buys exclusive materia and items at Chocobo Square and Battle Square shops.", "After this chapter: all Gongaga region open-world content becomes accessible."], "sideQuests": []}, {"id": 9, "title": "The Planet Stirs", "area": "Gongaga", "party": "Cloud, Aerith, Tifa, Barret, Red XIII, Yuffie, Cait Sith", "summary": "The party travels through the Corel Desert and into the jungle to reach Zack Fair's hometown of Gongaga. Significant revelations about Zack and Aerith's history. Cloud and the boys investigate the old Gongaga reactor while the girls stay in the village.", "note": "🔑 Don't explore the Gongaga open world yet — without the Chocobo you can't reach most of it. Complete the story section first, then come back with the Chocobo for full access.", "warn": null, "decisions": [{"text": "Gongaga village relationship interactions — do ALL before choosing to sleep: Red XIII (mushroom question, pick RIGHT patch ★★★), Yuffie inside the building with the rest spot ('Nice song. Funny too.' ★★★), Barret outside ('Mushrooms.' ★★★), Tifa by the piano building ('Gonna go with pot roast.' ★★★), Aerith at Zack's parents' house ('They didn't seem to mind.' ★★★).", "imp": true}, {"text": "When resting at Cissnei's, choose 'Until it's time to leave' specifically to properly continue the story.", "imp": false}], "items": [{"name": "Bird of Prey (Yuffie weapon)", "type": "c", "miss": false, "when": "In Gongaga village — after the party splits up, Yuffie is inside the building with the rest spot.", "how": "Look inside that same building — there's a purple chest containing the Bird of Prey. Grab it while you're there to speak with Yuffie."}, {"name": "Red Megaphone (Cait Sith weapon)", "type": "c", "miss": false, "when": "Still in Gongaga village — go to the SOUTHERNMOST part of the village.", "how": "At the southernmost bridge, face south — you'll see a purple chest in a WATER CAVE below. Jump down the cliffs to the LEFT of the bridge into the water, then swim to the cave. Easy to miss."}, {"name": "Crystal Sword (Cloud weapon)", "type": "c", "miss": false, "when": "Inside the Gongaga reactor — you've entered the facility and dealt with the first group of enemies.", "how": "Instead of squeezing through the door immediately, look for a SMALL SIDE ROOM first. The purple chest with the Crystal Sword is in that side room."}, {"name": "Sapphire (material)", "type": "c", "miss": false, "when": "Further inside the reactor — past the Grangalan enemy room, you crawl through a gap into a new area.", "how": "In the room after the gap, there's a chest containing a Sapphire. Grab it before continuing toward the objective."}, {"name": "3x Hazardous Materials", "type": "c", "miss": false, "when": "In the reactor hallway that splits — correct path goes LEFT, but there's a northeast branch.", "how": "Take the NORTHEAST hallway first. Chest with 3x Hazardous Materials is at the end of it."}], "bosses": [{"name": "Grasptropod (Gongaga Reactor)", "weakness": "Ice", "tips": ["Hit the arms and claws with physical abilities to Pressure it — that's the key mechanic.", "Use Blizzard/Blizzara whenever ATB is available to exploit Ice weakness and build stagger simultaneously.", "When it extends its claw for a grab: DODGE IMMEDIATELY. Being grabbed deals serious damage.", "Once staggered: dump all ATB abilities and Synergy Skills immediately."]}], "tips": ["After completing the story section, the Gongaga Chocobo becomes available — then do all open-world exploration.", "Gongaga jungle is maze-like — use the minimap and follow yellow Chocobo tracks to stay oriented.", "The Saga of the Seaside Inn side quest from Ch.6 can now be completed — get the Tonberry King's Crown via the Buggy in Southern Corel."], "sideQuests": [{"name": "Missing: Mr. Birdie", "char": "ba", "start": "North Corel — children near the gate. Unlocks at the start of Chapter 9.", "how": "Choose 'Someone's a softie' at dialogue for a relationship boost. Complete Excavation Intel 2 (Deserted Village) to unlock the Bird Trap recipe. Craft 3 Bird Traps, plant at marked locations, check each trap and fight the fiends (final fight: Gigant Bomb).", "reward": "Level Boost Materia", "req": null, "note": "Complete Deserted Village Excavation Intel first to unlock the Bird Trap recipe."}, {"name": "The Spice of Life", "char": "ae", "start": "Gongaga region — community noticeboard or NPC in Gongaga village. Available after unlocking the Gongaga Chocobo.", "how": "A cooking and ingredient-gathering quest through the Gongaga jungle. Use your Chocobo to locate ingredients at marked spots, fight enemies guarding them, return for the meal sequence.", "reward": "Aerith relationship boost, Party EXP", "req": null, "note": "Available once you have the Gongaga Chocobo after completing Ch.9's story section."}, {"name": "The Pursuit of Perfection", "char": "ba", "start": "Gongaga region — community noticeboard or NPC.", "how": "Track and defeat powerful fiends in the Gongaga jungle region. Uses the Chocobo scent mechanic to locate targets across multiple marked areas.", "reward": "Sharpshooter's Companion Vol. III (Barret SP), Party EXP", "req": null, "note": null}, {"name": "O Chicken, Where Art Thou", "char": "re", "start": "Gongaga region — community noticeboard or NPC.", "how": "Track a runaway Chocobo through the Gongaga jungle using Red XIII's enhanced tracking abilities. Combat encounters guard the Chocobo's trail.", "reward": "Tale of the Red Warrior Vol. III (Red XIII SP), Party EXP", "req": null, "note": null}, {"name": "Teach Me, Great Warrior", "char": "yu", "start": "Gongaga region — community noticeboard or NPC.", "how": "A multi-stage training quest showcasing Yuffie's ninja skills. Involves combat challenges and demonstrations of ninjutsu across the Gongaga region.", "reward": "Secrets of the Ninja Vol. III (Yuffie SP), Party EXP", "req": null, "note": null}]}, {"id": 10, "title": "Watcher of the Vale", "area": "Cosmo Canyon", "party": "Cloud, Aerith, Tifa, Barret, Red XIII, Yuffie, Cait Sith (then Red XIII and Barret solo for cave trial)", "summary": "Red XIII's home — Cosmo Canyon. His family history, his father's sacrifice, and the truth about his past are revealed. The chapter involves an extensive trial sequence in an underground cave system, played as Red XIII and Barret.", "note": "🔑 After Ch.10, the Nibel region opens via the airstrip. Visit Kamaria's Ranch vending machine there to buy Time, Warding, and Prayer Materia — among the best in the game.", "warn": null, "decisions": [{"text": "River of Lights ceremony: interact with all party members — save Aerith for LAST as speaking to her progresses the story. Tifa → 'You did good.' ★★★. Yuffie → 'Pretty much.' ★★★. Barret → 'No, we fight.' ★★★. Red XIII → 'I'll lend an ear.' ★★★. Aerith → 'Encourage her.' ★★★.", "imp": true}], "items": [{"name": "Hi-ether", "type": "c", "miss": false, "when": "In the trial cave playing as Red XIII and Barret — you've dealt with the first Nidhogg enemies and been taught to climb walls.", "how": "Climb the wall shown in the tutorial. Chest on the higher platform contains a Hi-ether."}, {"name": "Revival Earrings (accessory)", "type": "c", "miss": false, "when": "In the next cave room — you encounter Stringer enemies (spiderlike, weak to Fire and Lightning).", "how": "After dealing with the Stringers, climb the wall to the NORTHEAST. Chest on that stone structure platform contains Revival Earrings."}, {"name": "Mist Mega-Potion", "type": "c", "miss": false, "when": "The next large room — more enemies, and there's a climbable pillar in the center.", "how": "Look for the platform HALFWAY UP the climbable pillar in the center of the room. Chest with Mist Mega-Potion is on that middle platform."}, {"name": "Celestial Bangle (accessory)", "type": "c", "miss": false, "when": "A room with a hole in the middle leading below — there's a chest on the far side of the gap.", "how": "Don't fall through the hole. Instead, climb around the wall to the IMMEDIATE LEFT and cross over. Chest is on that far side ledge."}, {"name": "Timeworn Talisman (accessory)", "type": "c", "miss": false, "when": "Descending further — you pass above some white illuminated statues.", "how": "Stop at the SECOND TO LAST floor above the white statues. Run along the wall above those statues to reach a chest."}, {"name": "Mystic Collar (Red XIII weapon)", "type": "c", "miss": false, "when": "In the Trial room — collecting items scattered around a large chamber and bringing them to Bugenhagen.", "how": "Climb the wall on the RIGHT to the FIRST platform at the FRONT of the room. Bring that item back to Bugenhagen to receive the Mystic Collar."}, {"name": "Crystal Megaphone (Cait Sith weapon) + 5x Moogle Medals + 5,000 Gil + More", "type": "r", "miss": false, "when": "After the planetology review and heading back to the elevator — you're stopped by an assistant who leads you to a storeroom.", "how": "Follow the assistant to the door. Enter the storeroom and open ALL the chests along the way."}, {"name": "Calamitous Bazooka (Barret weapon)", "type": "c", "miss": true, "when": "You've reached the FIRST GATE in the cave trial. The game prompts you to interact with it.", "how": "DON'T open the gate yet. Turn AROUND and look DOWN to a lower platform with enemies. Deal with them. The purple chest with Barret's weapon is on that lower platform. THEN go back and open the gate."}, {"name": "Phoenix Down + Fortification Materia", "type": "c", "miss": false, "when": "In the Emerald Altar section — retrieving the emerald statue. Climb along the wall leaving Barret behind.", "how": "Hug the right side through the small room with pillars. Chest on a ledge contains the Phoenix Down. Then go down one more level — Fortification Materia is by the pool of water."}], "bosses": [{"name": "Gi Nattak", "weakness": "Fire / Healing spells (undead)", "tips": ["You only have Red XIII and Barret — make sure both are equipped with your best materia setup.", "Red's Stardust Ray + Barret's Maximum Fury deal the most damage. Save them for Pressure/Stagger windows.", "Soul Flames: kill them with AoE abilities BEFORE they reach the soul statues or they'll apply curses.", "Best curse to avoid: Halve HP. If you see it triggering, stagger Gi Nattak immediately to remove it.", "Gi enemies are undead — Healing spells damage them."]}], "tips": ["Cosmo Canyon World Intel includes multiple types — complete all before leaving for Chadley's VR content.", "There's a telescope in Cosmo Canyon — interact for lore and a hidden optional conversation.", "After completing the chapter: the Nibel region opens via the airstrip. Buy Time/Warding/Prayer Materia at Kamaria's Ranch."], "sideQuests": [{"name": "Absence of a Sign", "char": "ae", "start": "Cosmo Canyon — the observation tower area. Patrol with Cissnei. Available after Ch.10's main story section.", "how": "Use Cissnei's binoculars at the tower to spot monster hotspots, mark them on the map, visit and fight the fiends. Repeat until the third visit triggers a Gigantoad boss fight. After, Cissnei answers one question (lore, no bond effect).", "reward": "Fortunes Untold Vol. VI (Cait Sith SP)", "req": null, "note": "Cissnei's lore answers are worth hearing — choose whichever question interests you most."}, {"name": "From Whence Life Flows", "char": "re", "start": "Cosmo Canyon region — community noticeboard or NPC.", "how": "Navigate canyon terrain with Red XIII, investigate Wutai-connected water source anomalies. Combat encounters with canyon-native enemies including multiple wave fights.", "reward": "Tale of the Red Warrior Vol. IV (Red XIII SP), Party EXP", "req": null, "note": null}, {"name": "Promises to Keep", "char": "re", "start": "Cosmo Canyon region — community noticeboard or NPC.", "how": "Follow-up quest tied to the canyon's lore. Track a creature through the area using the Chocobo scent mechanic, fight the target fiend at the end of the trail.", "reward": "Tale of the Red Warrior Vol. V (Red XIII SP), Party EXP", "req": null, "note": null}, {"name": "Bonds of Trust", "char": "yu", "start": "Cosmo Canyon region — community noticeboard or NPC.", "how": "Work alongside Yuffie through a series of ninja-themed challenges in the canyon environment. Multiple combat stages.", "reward": "Secrets of the Ninja Vol. IV (Yuffie SP), Party EXP", "req": null, "note": null}]}, {"id": 11, "title": "The Long Shadow of Shinra", "area": "Nibel / Nibelheim", "party": "Cloud, Aerith, Tifa, Barret, Red XIII, Yuffie, Cait Sith", "summary": "The party returns to Nibelheim in the present day. Multiple boss fights, a section playing as Cait Sith solo through Shinra Manor, and a significant confrontation at the Mako Reactor.", "note": "🔑 Stock up on consumables before entering the reactor section. Multiple consecutive fights with limited bench access. 10+ Mega-Potions and 5+ Phoenix Downs per active character recommended.", "warn": "⚠️ AVOID USING CLOUD'S MP during the Diabolic Variant boss — he has two more boss fights this chapter.", "decisions": [{"text": "Nibelheim party interactions — do ALL: Aerith at the water tower → 'Sounds like something I'd do.' ★★★. Tifa in her old house → 'Have I helped you get through it at all?' ★★★. Barret at the inn → 'Hell yeah you're right. Screw them.' ★★★. Yuffie on path to mansion → 'Yup.' ★★★. Red XIII at bottom of stairs → 'This isn't my hometown.' ★★★.", "imp": true}, {"text": "In the Shinra Manor basement with Cait Sith — use the mine cart on the SECOND cell door to open it. Inside is a purple chest with the Golden Megaphone (Cait Sith weapon). Easy to walk past.", "imp": true}], "items": [{"name": "Crystal Gloves (Tifa weapon)", "type": "c", "miss": false, "when": "Heading up the mountain with Tifa and Yuffie — past a locked door you can't enter, the path continues.", "how": "Just past that locked door, look for a purple chest containing Crystal Gloves for Tifa."}, {"name": "HP<>MP Materia", "type": "p", "miss": false, "when": "Inside the cave section on the mountain — you deal with Twin Brains then go down toward a mako spring.", "how": "After the scene at the mako spring, the materia is sitting on the ground. Pick it up before continuing out of the cave."}, {"name": "Igneous Saber (Cloud weapon)", "type": "c", "miss": false, "when": "After crossing the narrow boards from Ch.1 (now replaced by a rope Yuffie sets up) — you're in a large section with multiple climbing walls.", "how": "On the platform in the MIDDLE between the two walls — that's where the purple chest is. Check it before climbing further up."}, {"name": "Warding Materia", "type": "p", "miss": false, "when": "At the top of the climbing wall section — you'd normally follow the path toward the objective.", "how": "Hug the RIGHT path INSTEAD of going toward the objective. Dead end there. Warding Materia is at that dead end."}, {"name": "Giga-Potion", "type": "c", "miss": false, "when": "Near the end of the reactor approach — after the Twin Brains puzzle and the door in the wall.", "how": "Turn LEFT first — chest with a Giga-Potion. Then go right and take the elevator up to the reactor."}, {"name": "Golden Megaphone (Cait Sith weapon)", "type": "c", "miss": true, "when": "Playing as Cait Sith in Shinra Manor basement — you've freed Aerith and Barret from the first cell. There's a second cell door nearby.", "how": "Use the button to drop a box, walk Cait's Moogle onto the button, aim at the second cell door switch, and throw the box to open it. Purple chest with the Golden Megaphone is inside that cell."}, {"name": "Gravity Materia", "type": "p", "miss": false, "when": "Still in the Shinra Manor basement — in a room where you need to destroy a pipe blocking an elevator.", "how": "Throw boxes at the boxes in the room — the Gravity Materia drops out of them."}, {"name": "Barrier Materia", "type": "p", "miss": false, "when": "Further in the Shinra Manor basement — in a large room before an Accelerant Distribution puzzle.", "how": "Take an IMMEDIATE RIGHT when entering this room. The Barrier Materia is sitting beside some mako crates. You'll need Lv.2+ Barrier for the upcoming boss."}, {"name": "ATK<>MATK Materia", "type": "p", "miss": false, "when": "Upper floors of the Shinra Manor basement — you reach a third blue vent.", "how": "Go through the THIRD blue vent. It leads to a dead-end platform. The ATK<>MATK Materia is there."}, {"name": "Hades Armlet (accessory)", "type": "c", "miss": false, "when": "After going through the RED vent on the same floor as the ATK<>MATK Materia.", "how": "Go IMMEDIATELY LEFT after exiting the red vent. Chest contains the Hades Armlet."}], "bosses": [{"name": "Diabolic Variant", "weakness": "Ice", "tips": ["Party is Cloud, Tifa, and Yuffie.", "ALWAYS prioritize the Right Arm first — destroying it gives a long Pressure window to build stagger.", "The variant clones itself after taking damage, but the clone spawns with the SAME current HP — not full HP. Destroy the clone, then keep attacking the original.", "Equip Ice-Elemental on everyone's weapons — constant bonus damage on every hit.", "SAVE CLOUD'S MP — he has two more boss fights this chapter. Let Tifa and Yuffie use MP freely."]}, {"name": "Yin & Yang", "weakness": "Fire", "tips": ["You only have Cait Sith for this fight.", "Equip Lv.2+ Barrier Materia — use Manaward or Manawall to reduce the heavy magic attacks (Thundaga).", "Incapacitate one head and the other enters Berserk — focus on one head at a time.", "Use Let's Ride to get on your Moogle — physical attacks from the Moogle are useful when the boss resists magic.", "Moogle Knuckle Duster builds stagger effectively."]}], "tips": ["After the manor sections, check ALL chests before triggering the final reactor push.", "Elemental-Ice in weapon slots deals constant bonus damage on Diabolic Variant — set it up before the fight.", "Cait Sith tip: Adjudicator enemies switch immunity between physical and magic damage when pressured. Alternate between Cait's magic attacks and Moogle physical attacks when they switch."], "sideQuests": [{"name": "Esoteric Secrets of the Elders", "char": "yu", "start": "Nibel region — community noticeboard or NPC near Nibelheim.", "how": "Investigate secrets hidden in old Nibel locations. Multi-step exploration quest revisiting familiar Ch.1 and Ch.11 spots with new context. Combat encounters throughout.", "reward": "Secrets of the Ninja Vol. V (Yuffie SP)", "req": null, "note": "⚠️ REQUIRED to unlock Gold Cup or Bust in Ch.12 (Chocobo Racing side quest). Do not skip."}, {"name": "My White-Haired Angel (6th Piano Song)", "char": "ti", "start": "Nibel region — an NPC associated with the piano questline. Completing it unlocks the sixth piano song.", "how": "Complete the quest to receive the final piano song. Then play it at the Nibelheim piano (Tifa's old house — now a treatment center) for an A Rank. Finally, speak to Dorian (who stands near the first 5 piano locations) with A Rank on all 6 songs to claim the full reward.", "reward": "Unlocks 6th and final piano song — complete all 6 for Dorian's reward", "req": null, "note": "Play the piano in Tifa's old house immediately after getting the song. Then find Dorian near the other piano locations."}]}, {"id": 12, "title": "A Golden Key", "area": "Gold Saucer (return)", "party": "Cloud + your highest-relationship party member", "summary": "The chapter that pays off all your relationship choices. Significant individual time with your highest-scored party member. A Gold Saucer colosseum tournament leads to a boss fight. The Loveless performance and Skywheel date are the emotional centerpiece.", "note": "🔑 LAST CHANCE to influence relationship scores before the Ch.12 date locks in. Once you rest at the hotel, the date is determined.", "warn": "⚠️ Make a MANUAL SAVE before entering the Loveless theater. Getting S-Rank requires good timing and you may want to retry.", "decisions": [{"text": "Find Dio: Red XIII in Chocobo Square, Cid in Speed Square, Barret in Event Square, Vincent in Ghost Square, Yuffie in Wonderment Square (beat her at 3D Brawler for Yuffie relationship points), Tifa at Skywheel Square entrance. Aerith at Battle Square is the ACTUAL story progress trigger — go to her last.", "imp": true}, {"text": "Loveless performance: press buttons as they appear on screen. You're allowed quite a lot of mistakes and will still get S-Rank. The specific girl who plays Rosa depends on your date partner.", "imp": false}], "items": [{"name": "All 11 Ch.12 Side Quests (see Side Quests tab)", "type": "r", "miss": false, "when": "When you land at Costa del Sol at the start of Ch.12 — 11 new side quests now available across all regions.", "how": "This is the major cleanup window. See the Side Quests tab for the full list. Complete them all before resting at the Gold Saucer hotel."}], "bosses": [{"name": "Abzu & Don Corneo", "weakness": "Fire", "tips": ["Load all three characters with Fire Materia and equip Elemental-Fire on Cloud — constant fire damage on every hit.", "Summon Ifrit or Phoenix when available — their fire summon abilities don't cost MP.", "At half health, Abzu gets Enrage — more damage, same strategy. Keep exploiting fire weakness.", "Ferocious Charge: if you DODGE it, Abzu hits the wall and stuns himself — free damage window. Move to the outside of the arena to bait it."]}, {"name": "Crimson Mare Mk. II", "weakness": "Lightning", "tips": ["Fast aerial mech — Barret's ranged attacks or Lightning magic from Aerith work best.", "Target the engine/booster units on its sides to Pressure it and force it to ground level.", "Energy beam sweep: move LATERALLY (not backward) as the beam tracks across the arena.", "Save Limit Breaks specifically for stagger windows — damage multiplier is highest then."]}], "tips": ["After winning the Gold Saucer tournament — Sephiroth unlocks in 3D Brawler. Beat him for the Polygonal Prizefighter trophy.", "QB Championship: all opponents are now available. New cards available for purchase at Costa del Sol QB vendor.", "Pirate Grottos: use the Tiny Bronco waterplane to find the 4 Pirate Grottos for item transmuter recipes.", "All Phenomenon Intel cleaned up → Gilgamesh Island unlocks in the northeast of Meridian Ocean."], "sideQuests": [{"name": "Hustle and Grind", "char": "ba", "start": "Kalm — return to town and speak to Beck. Chapter 12 only.", "how": "Fight a pack of fiends on the highway outside Kalm, then fight a second group of thugs and Devil Riders. Use Assess on the Devil Riders — it's their first appearance in the game.", "reward": "Sharpshooter's Companion Vol. VI (Barret SP)", "req": null, "note": "Short quest — knock it out first when you land at Costa del Sol to start Ch.12."}, {"name": "Tides of War and Worry", "char": "ti", "start": "Under Junon — speak to Priscilla. REQUIRES Calling All Frogs (Ch.4) to be completed.", "how": "Play the Dolphin Show minigame, recreating the underwater jumping sequence from Ch.4. Any rank completion finishes the quest. Rank 1: Elixir, Rank 2: Cosmotite Ore, Rank 3: 3x Dark Matter.", "reward": "Tifa relationship boost + Rank prizes above", "req": "Calling All Frogs (Ch.4)", "note": "Complete at least once — required to unlock Beneath Still Waters."}, {"name": "Beneath Still Waters", "char": "ae", "start": "Junon southern area — speak to the Midgar 7th Infantry soldiers. REQUIRES Tides of War and Worry first.", "how": "Fight Hell Rider II to drive it off, track its scent with your Chocobo across the Junon region. Two more tracking-and-fight sequences before the final confrontation with Hell Rider II.", "reward": "Telluric Scriptures Vol. VI (Aerith SP)", "req": "Tides of War and Worry", "note": null}, {"name": "Gold Cup or Bust", "char": "ti", "start": "Gold Saucer Chocobo Square — speak to Billy. REQUIRES Esoteric Secrets of the Elders (Ch.11) AND Gold Rank in Grade II racing.", "how": "Grade I Chocobo Races unlock here. Complete 3 races for points — highest total wins. You can restart any race leg from the menu if you have a bad run.", "reward": "Chocoking's Cape, 200 GP", "req": "Esoteric Secrets of the Elders + Gold Rank in racing", "note": "If you haven't raced much, grind Grade II races first to reach Gold Rank before attempting this."}, {"name": "Trouble in Paradise", "char": "yu", "start": "Costa del Sol — Mayor Kapono, then Kyrie. REQUIRES Lifeline in Peril (Ch.2) AND The Hardest Sell (Ch.4).", "how": "Transmute Legendary Bait — requires materials from re-fighting Classified Fiends in Gongaga (Great Malboro) and Cosmo Canyon (Jabberwock). Use the bait at Off-Limits Beach near Costa del Sol, fight the Sea Devils. At dialogue choice pick 'Passed off my work as yours' for the best Yuffie relationship boost.", "reward": "Secrets of the Ninja Vol. VI (Yuffie SP)", "req": "Lifeline in Peril + The Hardest Sell", "note": "Pick 'Passed off my work as yours' at the dialogue choice for maximum Yuffie relationship points."}, {"name": "Sand and Circuses", "char": "yu", "start": "Corel Dustbowl — near the Beast Battleground Pit. REQUIRES Trouble in Paradise first.", "how": "Unlocks the Special Tournament in the Beast Battleground. Cloud, Tifa, Aerith, Barret, and Yuffie each fight one-on-one against fiends individually (Cait Sith and Red XIII are excluded from this event).", "reward": "Secrets of the Ninja continued, Party EXP", "req": "Trouble in Paradise", "note": "Good for practicing individual characters you don't normally use."}, {"name": "Woodland Vigil", "char": "ae", "start": "Gongaga Village — community noticeboard. Chapter 12 only.", "how": "Patrol the Gongaga observation tower area for Cissnei. Use binoculars to spot monster hotspots, mark them, fight the fiends at each location. Third visit triggers the target creature encounter.", "reward": "Fortunes Untold Vol. VI (Cait Sith SP), Aerith relationship boost", "req": null, "note": null}, {"name": "Escape from Endless Writer's Block", "char": "ba", "start": "Gongaga Village Community Noticeboard — speak to the NPC, then navigate to Pear Blossom Bluff. Chapter 12 only.", "how": "Take photos of Red XIII at 3 themed locations: Resolve Theme (Rugged Shoals, far north of Gongaga), Suffering Theme (near Gongaga Reactor, southeast), and a third location. Keep the percentage bar green (100%) before shooting each photo.", "reward": "Barret relationship boost, Party EXP", "req": null, "note": "Reframe the shot until the percentage bar is fully green before taking each photo."}, {"name": "Victim of Circumstance", "char": "yu", "start": "Cosmo Canyon region — community noticeboard. Chapter 12 only.", "how": "Investigate a situation involving stolen items and mistaken identity in the canyon region. Dialogue choices and combat determine outcome. Choose wisely for the best result.", "reward": "Magnify Materia", "req": null, "note": null}, {"name": "Lament of the Damned", "char": "ba", "start": "Nibel region — community noticeboard or NPC. Chapter 12 only.", "how": "Investigate reports of powerful enemies across the Nibel region. Fight progressively stronger fiends across multiple marked locations in escalating encounters.", "reward": "The Art of Swordplay Vol. VI (Cloud SP), unlocks Hojo's Exams (additional combat trials)", "req": null, "note": "Completing this unlocks Hojo's Exams — extra combat trial content."}, {"name": "Can't Stop Won't Stop", "char": "al", "start": "Gold Saucer — speak to the Shinra Middle Manager. REQUIRES all 35 other side quests completed AND all Gold Saucer minigames finished.", "how": "A series of unique Gold Saucer tournament challenges. Includes a Queen's Blood match against the Shinra Middle Manager — win it for the Ultimate Party Animal card.", "reward": "Gambler Materia, Mecha Chocobo Attire (special costume), QB Card: Ultimate Party Animal", "req": "ALL 35 other side quests + all Gold Saucer minigames", "note": "🏆 The 36th and final side quest. Completing all 36 unlocks the My Job Here Is Done trophy. All quests also remain available via Chapter Select after finishing the game."}]}, {"id": 13, "title": "Where Angels Fear to Tread", "area": "Forgotten Capital (Northwood)", "party": "Cloud, Aerith, Tifa, Barret, Red XIII, Yuffie, Cait Sith", "summary": "The Forgotten Capital — an ancient Cetra city tied to Aerith's heritage. This is the game's most emotionally intense chapter. Multiple character trials must be completed before the final confrontation. Major story events occur that will deeply resonate with anyone who knows the original Final Fantasy VII.", "note": "⚠️ POINT OF NO RETURN: Once you pilot the Tiny Bronco north into the Northwood, you are locked into the final chapters. Do ALL cleanup in Ch.12 before going north.", "warn": "⚠️ MAJOR STORY EVENT occurs in this chapter. If you know the original FF7, you know what the Forgotten Capital means. Prepare yourself emotionally.", "decisions": [{"text": "Every piece of Aerith's dialogue in the Forgotten Capital is significant. Don't rush any conversation — some of what she says only makes sense in retrospect.", "imp": true}, {"text": "Do not skip any cutscene — even if something seems familiar from the original game, FF7 Rebirth's version contains critical differences.", "imp": true}], "items": [{"name": "All purple chests before the final push", "type": "c", "miss": true, "when": "Throughout your exploration of the Forgotten Capital — before triggering the final story sequence.", "how": "Open every chest before you push toward the final objective. After the story events of this chapter, you won't be able to return during this chapter."}, {"name": "REST AT EVERY BENCH", "type": "r", "miss": false, "when": "Whenever a bench or rest point appears throughout this chapter.", "how": "Rest at every single one. This chapter strings together difficult encounters — being at full HP and MP at each step matters more here than anywhere else."}], "bosses": [{"name": "Sephiroth (Forgotten Capital Phase 1)", "weakness": "No elemental weakness", "tips": ["Keep the entire party above 60% HP at all times — his attacks hit hard and he follows up fast.", "Use ALL your Limit Breaks — don't save them. There's a chapter break after this fight.", "Aerith Barriers are essential — cast immediately and refresh whenever they fall.", "Every stagger window: dump all ATB abilities from all characters simultaneously. Windows are brief and precious."]}], "tips": ["Fully upgrade every character's weapon before starting this chapter — max ability unlocks.", "Stock 10+ Mega-Potions and 5+ Phoenix Downs per active character.", "If you feel underpowered: use Chapter Select to go back to Ch.8 (Musclehead Colosseum) and farm AP and SP."], "sideQuests": []}, {"id": 14, "title": "End of the World", "area": "Northwood / Singularity", "party": "Cloud + rotating party members across multiple fights", "summary": "The final chapter. Multiple consecutive boss fights across different party configurations. The climax involves Jenova Lifeclinger followed by Sephiroth Reborn across multiple phases and character pairs. The ending reflects your Chapter 12 relationship.", "note": "🔑 Multiple bosses back-to-back with checkpoints between duo fights. Use ALL consumables — Elixirs, Mega-Potions, Turbo Ethers, Limit Breaks. This is what you saved them for.", "warn": "⚠️ If you die during Jenova Lifeclinger's duo phases, select 'Retry from Before Current Battle' — there are checkpoints at the start of each duo fight.", "decisions": [{"text": "No meaningful choices during gameplay — the ending cutscene reflects your Chapter 12 relationship partner. That choice was already made. Enjoy the payoff.", "imp": false}], "items": [{"name": "USE EVERYTHING IN YOUR INVENTORY", "type": "r", "miss": false, "when": "From the first fight through the last — all chapter long.", "how": "Elixirs, Hi-Elixirs, Mega-Potions, Turbo Ethers, Phoenix Downs — use them all. There is no next chapter. Hoarding items through the final chapter is the biggest mistake players make."}], "bosses": [{"name": "Jenova Lifeclinger", "weakness": "Lightning and Fire (resists Ice and Wind)", "tips": ["All 6 party members are used — make sure everyone is equipped before entering.", "Everyone except Cloud starts with a full Limit Break. Save them for the duo phases — don't use in the opening.", "Use Breach magic when Jenova casts Barrier — it halves physical damage until removed.", "Duo phase checkpoints: if you die, you can retry from the start of that specific duo fight.", "In the final section: whenever Jenova is Pressured she becomes immune to melee damage. Use magic attacks or heal and wait until she's vulnerable again."]}, {"name": "Sephiroth Reborn (Multiple Phases)", "weakness": "Use Assess at each phase start", "tips": ["Phase 1 — Cloud and Zack: straightforward. Use Zack's charged attacks (hold Triangle, or press immediately after Square). After Synergy moves, Zack gets unlimited MP briefly.", "Phase 2 — Cloud alone: watch for Heartless Angel (leaves you with 1 HP). Prep a heal immediately when you see the animation.", "Phase 3 — Tifa, Red, Cait Sith: focus Bahamut Arisen until Sephiroth lowers his arms, then switch to his arms. When Bahamut is being revived, hit the wings.", "Phase 4 — Zack with Cloud Synergy: attack Sephiroth's chest. Build to Charge Lv.3 with Zack before the stagger window.", "Phase 5 — Red, Barret, Yuffie: Core is invulnerable. Use Yuffie's Ninjutsu matching the wing's element to destroy the wings. Then focus the core.", "Phase 6 — Cloud and Aerith vs Human Sephiroth: use Aerith's magic to damage his wing and Masamune when he uses Whisper attacks.", "FINAL: Tempus Finis — Sephiroth rotates slowly with Whisper beams. Keep attacking while dodging beams to stagger. Land the killing blow DURING THE STAGGER WINDOW or he uses Octaslash Prime — devastating."]}], "tips": ["After the credits: Chapter Select unlocks for every chapter. 100% completion, missed items, and alternate relationship paths are all still available.", "If you struggle: use Chapter Select to go back to Ch.8 (Musclehead Colosseum) and grind AP and SP. Your level and equipment from Ch.14 carries over.", "Elemental materia linked to the right element in your weapon slot = constant damage advantage — verify your loadout before entering."], "sideQuests": []}];
const CHAR_META={"ae": {"lbl": "Aerith", "cls": "cae"}, "ti": {"lbl": "Tifa", "cls": "cti"}, "ba": {"lbl": "Barret", "cls": "cba"}, "re": {"lbl": "Red XIII", "cls": "cre"}, "yu": {"lbl": "Yuffie", "cls": "cyu"}, "al": {"lbl": "All party", "cls": "cal"}};
const TM={c:{cls:'tc',icon:'📦',lbl:'CHEST'},p:{cls:'tp',icon:'✨',lbl:'PICKUP'},b:{cls:'tb',icon:'🛒',lbl:'VENDOR'},r:{cls:'tr2',icon:'🏆',lbl:'REWARD'}};
let cur=1,tab='all',openBoss=null,light=false;
let S={};try{S=JSON.parse(localStorage.getItem('ff7g2')||'{}');}catch(e){}
function save(){try{localStorage.setItem('ff7g2',JSON.stringify(S));}catch(e){}}
function get(k){return!!S[k];}
function tog(k,e){if(e)e.stopPropagation();S[k]=!S[k];save();render();}

function buildNav(){
  const n=document.getElementById('ch-nav');
  n.innerHTML=CHAPTERS.map(c=>`<button class="ch-btn${c.id===cur?' active':''}" onclick="setCh(${c.id})">CH ${c.id}</button>`).join('');
}
function buildTabs(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
}
function render(){
  buildNav();buildTabs();
  const ch=CHAPTERS.find(c=>c.id===cur);
  const show=t=>tab==='all'||tab===t;
  const doneItems=ch.items.filter((_,i)=>get('ci'+ch.id+'_'+i)).length;
  const doneQuests=ch.sideQuests.filter((_,i)=>get('sq'+ch.id+'_'+i)).length;
  const pct=ch.items.length?Math.round(doneItems/ch.items.length*100):0;

  let h=`<div style="padding:15px 15px 0">
    <div class="ch-num">Chapter ${ch.id} of 14</div>
    <div class="ch-title">${ch.title}</div>
    <div class="ch-meta">📍 ${ch.area}</div>
    <div class="ch-meta" style="margin-bottom:8px">👥 ${ch.party}</div>
    ${ch.items.length?`<div style="font-size:10px;color:var(--pur-dim);margin-bottom:3px">Items: ${doneItems}/${ch.items.length} collected${ch.sideQuests.length?' · Side Quests: '+doneQuests+'/'+ch.sideQuests.length+' done':''}</div><div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>`:''}
    <div class="ch-sum">${ch.summary}</div>
    ${ch.note?`<div class="ch-note">${ch.note}</div>`:''}
    ${ch.warn?`<div class="ch-warn">${ch.warn}</div>`:''}
  </div>`;

  // SIDE QUESTS
  if(show('quests')){
    h+=`<div class="sec"><div class="sec-hd" style="color:#80c848">📋 SIDE QUESTS (ODD JOBS)<div class="sec-line" style="background:linear-gradient(90deg,#80c84840,transparent)"></div></div>`;
    if(!ch.sideQuests.length){
      h+=`<div class="sq-none">No side quests unlock in this chapter.</div>`;
    } else {
      h+=`<div style="font-size:9px;color:var(--txt-mut);letter-spacing:2px;margin-bottom:8px">TAP TO MARK AS COMPLETE</div>`;
      ch.sideQuests.forEach((q,i)=>{
        const k='sq'+ch.id+'_'+i;const done=get(k);
        const cm=CHAR_META[q.char]||{lbl:'Party',cls:'cal'};
        h+=`<div class="sq-card ${cm.cls}${done?' done':''}" onclick="tog('${k}',event)">
          <div class="sq-hd">
            <div class="sq-chk${done?' on':''}">${done?'✓':''}</div>
            <div class="sq-name">${q.name}</div>
            <div class="char-badge ${cm.cls}">${cm.lbl}</div>
          </div>
          <div class="sq-body">
            <div class="sq-line"><span class="sq-lbl">START</span>${q.start}</div>
            <div class="sq-how"><span class="sq-lbl">HOW</span>${q.how}</div>
            <div class="sq-reward"><span class="sq-lbl">REWARD</span>${q.reward}</div>
            ${q.req?`<div class="sq-req" style="background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.1);color:inherit;opacity:.8">⚠️ Requires: ${q.req}</div>`:''}
            ${q.note?`<div class="sq-note" style="background:rgba(0,0,0,.2);border-color:rgba(255,255,255,.1)">💡 ${q.note}</div>`:''}
          </div></div>`;
      });
    }
    h+=`</div>`;
  }

  // DECISIONS
  if(show('decisions')&&ch.decisions.length){
    h+=`<div class="sec"><div class="sec-hd" style="color:#7030b0">⚡ KEY DECISIONS<div class="sec-line" style="background:linear-gradient(90deg,#7030b040,transparent)"></div></div>
    ${ch.decisions.map(d=>`<div class="dec ${d.imp?'imp':'norm'}">${d.imp?'<span class="imp-lbl">IMPORTANT</span>':''}${d.text}</div>`).join('')}</div>`;
  }

  // ITEMS
  if(show('items')&&ch.items.length){
    h+=`<div class="sec"><div class="sec-hd" style="color:#207848">💎 ITEMS TO COLLECT<div class="sec-line" style="background:linear-gradient(90deg,#20784840,transparent)"></div></div>
    <div style="font-size:9px;color:var(--txt-mut);letter-spacing:2px;margin-bottom:8px">TAP TO MARK AS COLLECTED</div>
    ${ch.items.map((it,i)=>{const k='ci'+ch.id+'_'+i;const done=get(k);const tm=TM[it.type]||TM.c;
      return`<div class="item-card${done?' done':''}" onclick="tog('${k}',event)">
        <div class="item-hd"><div class="ichk${done?' on':''}">${done?'✓':''}</div>
        <div class="iname">${it.name}${it.miss?'<span class="miss-tag">⚠️ MISSABLE</span>':''}</div>
        <div class="tbadge ${tm.cls}">${tm.icon} ${tm.lbl}</div></div>
        <div class="ibody">
          <div class="iwhen"><span class="ilbl">WHEN</span>${it.when}</div>
          <div class="ihow"><span class="ilbl">HOW</span>${it.how}</div>
        </div></div>`;
    }).join('')}</div>`;
  }

  // BOSSES
  if(show('bosses')&&ch.bosses.length){
    h+=`<div class="sec"><div class="sec-hd" style="color:#882828">💀 BOSS FIGHTS<div class="sec-line" style="background:linear-gradient(90deg,#88282840,transparent)"></div></div>
    ${ch.bosses.map((b,i)=>{const k='boss'+ch.id+'_'+i;const open=openBoss===k;
      return`<div class="boss-card"><div class="boss-hd${open?' open':''}" onclick="openBoss='${open?'null':k}';render()">
        <div><div class="bname">💀 ${b.name}</div><div class="bweak">Weakness: ${b.weakness}</div></div>
        <div style="color:#703030;font-size:14px">${open?'▲':'▼'}</div></div>
        <div class="boss-body${open?' open':''}">
          ${b.tips.map(t=>`<div class="btip"><span class="btarr">›</span><span>${t}</span></div>`).join('')}
        </div></div>`;
    }).join('')}</div>`;
  }

  // TIPS + NOTES
  if(show('tips')&&ch.tips.length){
    h+=`<div class="sec"><div class="sec-hd" style="color:#204878">💡 PRO TIPS<div class="sec-line" style="background:linear-gradient(90deg,#20487840,transparent)"></div></div>
    ${ch.tips.map(t=>`<div class="tip-card">› ${t}</div>`).join('')}</div>`;
  }
  if(show('all')){
    const noteVal=(S['note'+ch.id]||'').replace(/"/g,'&quot;');
    h+=`<div class="sec"><div style="font-size:9px;color:var(--pur-dim);letter-spacing:3px;margin-bottom:6px">📝 YOUR NOTES</div>
    <textarea class="notes-area" placeholder="Your notes for this chapter..." onchange="S['note${ch.id}']=this.value;save()">${noteVal}</textarea></div>`;
  }

  document.getElementById('content').innerHTML=h;
  document.getElementById('content').scrollTop=0;
}

function setCh(id){cur=id;tab='all';openBoss=null;render();}
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.tab;render();}));
document.getElementById('theme-btn').addEventListener('click',()=>{
  light=!light;document.body.classList.toggle('light',light);
  document.getElementById('theme-btn').textContent=light?'🌙':'☀️';
  S.theme=light?'l':'d';save();
});
if(S.theme==='l'){light=true;document.body.classList.add('light');document.getElementById('theme-btn').textContent='🌙';}
render();
</script>
</body>
</html>
