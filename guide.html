<title>FF7 Rebirth — Chapter Guide</title>
<style>
:root{--bg:#080812;--bg2:#0d0c1a;--nav:#060610;--hdr:#120828;--pur:#8050d0;--pur-dim:#40286a;--pur-lt:#c090ff;--pur-txt:#b080f0;--pur-brd:#4a2878;--grn:#48c878;--grn-bg:#0d1e14;--grn-brd:#1f5c38;--red:#f08080;--red-bg:#180e0e;--red-brd:#5a2020;--blu:#60a8e8;--blu-bg:#0e1620;--blu-brd:#274878;--gold:#d4a820;--txt:#ddd0f0;--txt-dim:#9080b0;--txt-mut:#50386a}
.light{--bg:#f0ecf8;--bg2:#e8e0f4;--nav:#ddd4f0;--hdr:#e8e0ff;--pur-txt:#5030a0;--pur-brd:#9070d0;--pur:#6040b0;--pur-dim:#8060c0;--pur-lt:#4020a0;--grn:#186838;--grn-bg:#e8f4ec;--grn-brd:#2a9a58;--red:#a02020;--red-bg:#f8eded;--red-brd:#c05050;--blu:#1848a0;--blu-bg:#e8f0f8;--blu-brd:#4878c0;--gold:#7a5800;--txt:#1a1030;--txt-dim:#503880;--txt-mut:#9080b0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:Georgia,serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{background:var(--hdr);border-bottom:1px solid var(--pur-brd);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-home{font-size:18px;text-decoration:none;flex-shrink:0}
.hdr-title{flex:1;text-align:center}
.hdr-title h1{font-size:13px;font-weight:bold;color:var(--pur-lt);letter-spacing:1px}
.light .hdr-title h1{color:var(--pur)}
.hdr-sub{font-size:9px;color:var(--txt-mut);letter-spacing:2px}
#theme-btn{background:var(--pur-brd);border:1px solid var(--pur);border-radius:16px;padding:4px 10px;font-size:11px;color:var(--pur-lt);cursor:pointer;font-family:Georgia,serif;flex-shrink:0}
#ch-nav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:var(--nav);border-bottom:1px solid #100e20;flex-shrink:0;scrollbar-width:none}
#ch-nav::-webkit-scrollbar{display:none}
.ch-btn{flex-shrink:0;padding:5px 10px;border-radius:4px;border:1px solid #1c1438;background:transparent;color:#3d2a60;cursor:pointer;font-size:11px;font-family:Georgia,serif;letter-spacing:1px;white-space:nowrap}
.ch-btn.active{border-color:var(--pur);background:linear-gradient(135deg,#2e1260,#160830);color:var(--pur-lt);font-weight:bold}
.light .ch-btn.active{background:linear-gradient(135deg,#c0a0ff,#a080e0);color:#fff}
#tab-bar{display:flex;overflow-x:auto;padding:0 14px;border-bottom:1px solid #100c20;flex-shrink:0;background:var(--bg2);scrollbar-width:none}
#tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:7px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--txt-mut);cursor:pointer;font-size:12px;font-family:Georgia,serif;white-space:nowrap}
.tab-btn.active{border-bottom-color:var(--pur);color:var(--pur-txt);font-weight:bold}
#content{flex:1;overflow-y:auto;padding:0 0 60px;-webkit-overflow-scrolling:touch}
.ch-num{font-size:9px;letter-spacing:4px;color:var(--pur-dim);margin-bottom:3px;text-transform:uppercase}
.ch-title{font-size:21px;font-weight:bold;color:var(--pur-lt);letter-spacing:1px;margin-bottom:4px}
.light .ch-title{color:var(--pur)}
.ch-meta{font-size:11px;color:var(--txt-mut);margin-bottom:2px}
.ch-sum{font-size:13px;line-height:1.75;color:var(--txt-dim);margin-bottom:10px}
.ch-note{background:var(--hdr);border:1px solid var(--pur-brd);border-left:3px solid var(--pur);border-radius:6px;padding:10px 13px;font-size:12px;color:var(--pur-txt);margin-bottom:12px;line-height:1.55}
.ch-warn{background:#1a1008;border:1px solid #6a4008;border-left:3px solid var(--gold);border-radius:6px;padding:10px 13px;font-size:12px;color:var(--gold);margin-bottom:12px;line-height:1.55}
.light .ch-warn{background:#fdf5e0;border-color:#c09010;color:#7a5800}
.sec{padding:0 15px;margin-bottom:16px}
.sec-hd{font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-line{flex:1;height:1px}
.dec{padding:10px 13px;border-radius:6px;margin-bottom:7px;font-size:12px;line-height:1.65;border-left:3px solid}
.dec.imp{background:#1a1030;border:1px solid #7840c0;border-left:3px solid #b060f0;color:#c898f8}
.dec.norm{background:#130e22;border:1px solid #2e1a50;border-left:3px solid #5a2a90;color:#9070c0}
.light .dec.imp{background:#ede8f8;border-color:#6040b0;color:#4020a0}
.light .dec.norm{background:#f4f0fc;border-color:#9070c0;color:#6050a0}
.imp-lbl{font-size:8px;color:#b060f0;letter-spacing:3px;text-transform:uppercase;display:block;margin-bottom:4px}
.light .imp-lbl{color:#6040b0}
.item-card{border-radius:8px;margin-bottom:8px;border:1px solid var(--grn-brd);background:var(--grn-bg);cursor:pointer;overflow:hidden}
.item-card.done{opacity:.4}
.item-hd{display:flex;align-items:center;gap:9px;padding:9px 11px 7px;border-bottom:1px solid #122018}
.light .item-hd{border-bottom-color:#c0dcc8}
.ichk{width:16px;height:16px;border-radius:3px;border:2px solid #1a4830;background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.ichk.on{background:#2a7a48;border-color:#2a7a48}
.iname{flex:1;font-size:13px;font-weight:bold;color:var(--grn)}
.done .iname{text-decoration:line-through;color:#386848}
.light .iname{color:#186838}
.tbadge{font-size:8px;letter-spacing:1px;border-radius:3px;padding:2px 6px;flex-shrink:0;border:1px solid}
.tc{background:#122a1a;border-color:#2a7a48;color:#2a7a48}.tp{background:#1e1608;border-color:#a07808;color:#a07808}
.tb{background:#0e1a28;border-color:#306898;color:#306898}.tr2{background:#1e180a;border-color:#a09020;color:#a09020}
.light .tc{background:#e8f4ec;border-color:#2a9a58;color:#186838}.light .tp{background:#fdf5e0;border-color:#c09010;color:#7a5800}
.light .tb{background:#e8f0f8;border-color:#4878c0;color:#1848a0}.light .tr2{background:#fdf5e0;border-color:#c09020;color:#7a5800}
.ibody{padding:8px 11px 10px}
.ilbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#1a5035;display:inline-block;margin-right:4px}
.light .ilbl{color:#186838}
.iwhen{font-size:11px;color:#286848;line-height:1.55;margin-bottom:5px}
.ihow{font-size:12px;color:#3a8858;line-height:1.6}
.light .iwhen{color:#186838}.light .ihow{color:#1a6040}
.miss-tag{font-size:8px;background:#3a1008;border:1px solid #c04010;color:#f06030;border-radius:3px;padding:2px 6px;margin-left:4px}
.light .miss-tag{background:#fff0e8;border-color:#e06030;color:#c04010}
.boss-card{background:var(--red-bg);border:1px solid var(--red-brd);border-radius:8px;margin-bottom:9px;overflow:hidden}
.boss-hd{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.boss-hd.open{background:#220e0e}.light .boss-hd.open{background:#f8e0e0}
.bname{font-size:14px;font-weight:bold;color:var(--red)}.light .bname{color:#a02020}
.bweak{font-size:10px;color:#905050;margin-top:2px}.light .bweak{color:#804040}
.boss-body{padding:0 14px 12px;border-top:1px solid #280e0e;display:none}
.light .boss-body{border-top-color:#e0c0c0}
.boss-body.open{display:block}
.btip{font-size:12px;color:#c08080;padding:5px 0;border-bottom:1px solid #1e0c0c;line-height:1.6;display:flex;gap:8px}
.light .btip{color:#803030;border-bottom-color:#e8d0d0}.btip:last-child{border-bottom:none}
.btarr{color:#602020;flex-shrink:0}
.tip-card{padding:9px 13px;background:var(--blu-bg);border:1px solid var(--blu-brd);border-left:3px solid #3060a0;border-radius:6px;margin-bottom:6px;font-size:12px;color:var(--blu);line-height:1.65}
.light .tip-card{color:#1848a0}
.notes-area{width:100%;min-height:80px;background:var(--bg2);border:1px solid var(--pur-brd);border-radius:6px;color:var(--txt);font-size:13px;font-family:Georgia,serif;padding:10px;resize:vertical;outline:none;line-height:1.6}
.light .notes-area{background:#fff;border-color:#c0b0e0;color:#1a1030}
.prog-wrap{height:4px;background:#1a1030;border-radius:2px;margin:6px 0 12px;overflow:hidden}
.light .prog-wrap{background:#ddd0f0}
.prog-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pur),var(--pur-lt));transition:width .3s}
/* ── SIDE QUEST STYLES ── */
.sq-card{border-radius:8px;margin-bottom:8px;border:1px solid;overflow:hidden;cursor:pointer}
.sq-card.done{opacity:.4}
.sq-hd{display:flex;align-items:center;gap:9px;padding:9px 11px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.sq-chk{width:16px;height:16px;border-radius:3px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.sq-name{flex:1;font-size:13px;font-weight:bold}
.char-badge{font-size:9px;letter-spacing:1px;border-radius:3px;padding:2px 7px;border:1px solid;flex-shrink:0}
.sq-body{padding:8px 11px 10px}
.sq-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;display:inline-block;margin-right:4px}
.sq-line{font-size:11px;line-height:1.55;margin-bottom:5px}
.sq-how{font-size:12px;line-height:1.6;margin-bottom:5px}
.sq-reward{font-size:11px;opacity:.8;line-height:1.4}
.sq-req{font-size:10px;margin-top:4px;padding:3px 8px;border-radius:3px;display:inline-block;border:1px solid}
.sq-note{font-size:11px;margin-top:5px;padding:6px 8px;border-radius:4px;border:1px solid;line-height:1.5}
/* char color classes */
.cae{background:#1a0820;border-color:#800840;color:#e06090}.cae .sq-chk{border-color:#800840}.cae .sq-name{color:#e06090}.cae .sq-chk.on{background:#800840;border-color:#800840}
.cti{background:#0a1a28;border-color:#084878;color:#60a8e8}.cti .sq-chk{border-color:#084878}.cti .sq-name{color:#60a8e8}.cti .sq-chk.on{background:#084878;border-color:#084878}
.cba{background:#0a1a08;border-color:#285808;color:#60c840}.cba .sq-chk{border-color:#285808}.cba .sq-name{color:#60c840}.cba .sq-chk.on{background:#285808;border-color:#285808}
.cre{background:#180e08;border-color:#682808;color:#d07040}.cre .sq-chk{border-color:#682808}.cre .sq-name{color:#d07040}.cre .sq-chk.on{background:#682808;border-color:#682808}
.cyu{background:#181020;border-color:#580858;color:#c060c0}.cyu .sq-chk{border-color:#580858}.cyu .sq-name{color:#c060c0}.cyu .sq-chk.on{background:#580858;border-color:#580858}
.cal{background:#181418;border-color:#486048;color:#a0d8a0}.cal .sq-chk{border-color:#486048}.cal .sq-name{color:#a0d8a0}.cal .sq-chk.on{background:#486048;border-color:#486048}
.light .cae{background:#ffe8f0;border-color:#e080a0;color:#c03060}.light .cae .sq-name{color:#c03060}
.light .cti{background:#e8f0f8;border-color:#4878c0;color:#1848a0}.light .cti .sq-name{color:#1848a0}
.light .cba{background:#e8f8e8;border-color:#508830;color:#306020}.light .cba .sq-name{color:#306020}
.light .cre{background:#f8f0e8;border-color:#b06830;color:#804020}.light .cre .sq-name{color:#804020}
.light .cyu{background:#f4e8f8;border-color:#906898;color:#604080}.light .cyu .sq-name{color:#604080}
.light .cal{background:#e8f4e8;border-color:#508850;color:#306030}.light .cal .sq-name{color:#306030}
.sq-none{padding:14px;font-size:13px;color:var(--txt-mut);text-align:center;font-style:italic}
</style>
</head>
