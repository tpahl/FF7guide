<title>FF7 Rebirth - Character Builds</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:Georgia,serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#hdr{background:var(--hdr);border-bottom:1px solid var(--pur-brd);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr-home{font-size:18px;text-decoration:none;flex-shrink:0}
.hdr-title{flex:1;text-align:center}
.hdr-title h1{font-size:13px;font-weight:bold;color:var(--pur-lt);letter-spacing:1px}
.light .hdr-title h1{color:var(--pur)}
.hdr-sub{font-size:9px;color:var(--txt-mut);letter-spacing:2px}
#theme-btn{background:var(--pur-brd);border:1px solid var(--pur);border-radius:16px;padding:4px 10px;font-size:11px;color:var(--pur-lt);cursor:pointer;font-family:Georgia,serif;flex-shrink:0}
#char-nav{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;background:var(--nav);border-bottom:1px solid #100e20;flex-shrink:0;scrollbar-width:none}

.ch-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid #1c1438;background:transparent;color:#3d2a60;cursor:pointer;font-size:12px;font-family:Georgia,serif;white-space:nowrap}
.ch-btn.active{border-color:var(--pur);color:var(--pur-lt);font-weight:bold}
.light .ch-btn.active{background:var(--pur);color:#fff}
#sec-nav{display:flex;overflow-x:auto;padding:0 14px;border-bottom:1px solid #100c20;flex-shrink:0;background:var(--bg2);scrollbar-width:none}
#sec-nav::-webkit-scrollbar{display:none}
.sec-tab{padding:7px 12px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--txt-mut);cursor:pointer;font-size:12px;font-family:Georgia,serif;white-space:nowrap}
.sec-tab.active{border-bottom-color:var(--pur);color:var(--pur-txt);font-weight:bold}
#content{flex:1;overflow-y:auto;padding:0 0 60px;-webkit-overflow-scrolling:touch}
.char-hdr{padding:16px 15px 12px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--pur-brd)}
.c-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;border:2px solid}
.c-name{font-size:22px;font-weight:bold;letter-spacing:1px;margin-bottom:3px}
.c-role{font-size:11px;color:var(--txt-dim);line-height:1.5}
.sec{padding:12px 15px 0}
.sec-hd{font-size:9px;letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-line{flex:1;height:1px}
.info-box{padding:10px 13px;border-radius:7px;margin-bottom:12px;border:1px solid;font-size:12px;line-height:1.6}
.ib-pur{background:var(--hdr);border-color:var(--pur-brd);color:var(--pur-txt)}
.ib-gold{background:var(--gold-bg);border-color:var(--gold-brd);color:var(--gold)}
.light .ib-pur{background:#ede8f8;border-color:#9070d0;color:#5030a0}
.light .ib-gold{color:#7a5800}
.ib-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:4px;opacity:.7}
.mat-slot{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.slot-lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--txt-mut);width:50px;flex-shrink:0;padding-top:11px}
.pills{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.pill{padding:5px 10px;border-radius:16px;font-size:11px;border:1px solid;line-height:1.3}
.pg{background:var(--grn-bg);border-color:var(--grn-brd);color:var(--grn)}
.pb{background:var(--blu-bg);border-color:var(--blu-brd);color:var(--blu)}
.pr{background:var(--red-bg);border-color:var(--red-brd);color:var(--red)}
.pgo{background:var(--gold-bg);border-color:var(--gold-brd);color:var(--gold)}
.pp{background:var(--hdr);border-color:var(--pur-brd);color:var(--pur-txt)}
.light .pg{background:#e8f4ec;border-color:#2a9a58;color:#186838}
.light .pb{background:#e8f0f8;border-color:#4878c0;color:#1848a0}
.light .pr{background:#f8eded;border-color:#c05050;color:#a02020}
.light .pgo{background:#fdf5e0;border-color:#c09010;color:#7a5800}
.light .pp{background:#ede8f8;border-color:#9070d0;color:#5030a0}
.wpn-row{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--hdr);border:1px solid var(--pur-brd);border-radius:7px;margin-bottom:7px}
.wpn-num{width:24px;height:24px;border-radius:50%;background:var(--pur-brd);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:var(--pur-lt);flex-shrink:0;margin-top:2px}
.wpn-name{font-size:13px;font-weight:bold;color:var(--pur-txt);margin-bottom:2px}
.light .wpn-name{color:var(--pur)}
.wpn-where{font-size:11px;color:var(--pur-dim);margin-bottom:2px}
.wpn-why{font-size:11px;color:var(--txt-dim);line-height:1.5}
.folio-card{background:var(--hdr);border:1px solid var(--pur-brd);border-radius:8px;margin-bottom:8px;overflow:hidden}
.folio-hd{padding:9px 13px;font-size:11px;font-weight:bold;color:var(--pur-txt);border-bottom:1px solid var(--pur-brd);display:flex;align-items:center;gap:8px}
.light .folio-hd{color:var(--pur)}
.t-num{width:20px;height:20px;border-radius:50%;background:var(--pur-brd);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--pur-lt);flex-shrink:0}
.folio-body{padding:8px 13px}
.f-item{font-size:12px;color:var(--txt-dim);padding:4px 0;border-bottom:1px solid #1a1030;display:flex;gap:8px;line-height:1.5}
.light .f-item{border-bottom-color:#e0d8f0}
.f-item:last-child{border-bottom:none}
.f-dot{color:var(--pur-dim);flex-shrink:0}
.party-card{background:var(--hdr);border:1px solid var(--pur-brd);border-radius:8px;margin-bottom:8px;padding:11px 13px}
.party-name{font-size:13px;font-weight:bold;color:var(--pur-txt);margin-bottom:6px}
.light .party-name{color:var(--pur)}
.party-members{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.pmember{padding:4px 10px;border-radius:14px;font-size:11px;border:1px solid;font-weight:bold}
.party-why{font-size:11px;color:var(--txt-dim);line-height:1.5}
.tip-card{padding:9px 13px;background:var(--blu-bg);border:1px solid var(--blu-brd);border-left:3px solid #3060a0;border-radius:6px;margin-bottom:6px;font-size:12px;color:var(--blu);line-height:1.65}
.light .tip-card{color:#1848a0}
.miss-warn{background:#1a1008;border:1px solid #6a4008;border-left:3px solid var(--gold);border-radius:5px;padding:4px 8px;font-size:9px;color:var(--gold);margin-top:4px;letter-spacing:1px}
.light .miss-warn{background:#fdf5e0;color:#7a5800}
</style>
</head>

const CHAR_LIST=[
{id:"cloud",name:"Cloud",e:"&#9876;&#65039;"},
{id:"tifa",name:"Tifa",e:"&#129354;"},
{id:"aerith",name:"Aerith",e:"&#127800;"},
{id:"barret",name:"Barret",e:"&#128299;"},
{id:"redxiii",name:"Red XIII",e:"&#128062;"},
{id:"yuffie",name:"Yuffie",e:"&#127775;"},
{id:"caitsith",name:"Cait Sith",e:"&#127922;"},
];

let curChar="cloud",curSec="materia",light=false;

function buildNav(){
  const nav=document.getElementById("char-nav");
  nav.innerHTML=CHAR_LIST.map(c=>`<button class="ch-btn${c.id===curChar?" active":""}" onclick="setCh('${c.id}')">${c.e} ${c.name}</button>`).join("");
}

function buildSecNav(){
  document.querySelectorAll(".sec-tab").forEach(b=>b.classList.toggle("active",b.dataset.s===curSec));
}

function pillHtml(pills){
  return pills.map(([txt,cls])=>`<div class="pill ${cls}">${txt}</div>`).join("");
}

function render(){
  buildNav();buildSecNav();
  const b=CHARS.find(c=>c.id===curChar);
  const color=b.color;
  let h=`<div class="char-hdr">
    <div class="c-avatar" style="background:${color}20;border-color:${color}60;font-size:26px">${b.emoji}</div>
    <div><div class="c-name" style="color:${color}">${b.name}</div><div class="c-role">${b.role}</div></div>
  </div>`;

  if(curSec==="materia"){
    h+=`<div class="sec">
      <div class="sec-hd" style="color:${color}">MATERIA LOADOUT<div class="sec-line" style="background:linear-gradient(90deg,${color}40,transparent)"></div></div>
      <div style="font-size:10px;color:var(--txt-mut);letter-spacing:2px;margin-bottom:10px">WEAPON SLOTS</div>`;
    b.matW.forEach(s=>{
      h+=`<div class="mat-slot"><div class="slot-lbl">${s.l}</div><div class="pills">${pillHtml(s.pills)}</div></div>`;
    });
    h+=`<div style="font-size:10px;color:var(--txt-mut);letter-spacing:2px;margin:14px 0 10px">ARMOR SLOTS</div>`;
    b.matA.forEach(s=>{
      h+=`<div class="mat-slot"><div class="slot-lbl">${s.l}</div><div class="pills">${pillHtml(s.pills)}</div></div>`;
    });
    h+=`</div>`;
  }
  else if(curSec==="weapons"){
    h+=`<div class="sec">
      <div class="sec-hd" style="color:${color}">WEAPON PROGRESSION<div class="sec-line" style="background:linear-gradient(90deg,${color}40,transparent)"></div></div>
      <div class="info-box ib-pur" style="margin-bottom:12px">Always upgrade weapon abilities with SP as soon as you get a new weapon. Don't just equip and forget - the unlocked abilities matter as much as the weapon stats.</div>`;
    b.weapons.forEach((w,i)=>{
      h+=`<div class="wpn-row">
        <div class="wpn-num">${i+1}</div>
        <div><div class="wpn-name">${w.n}</div><div class="wpn-where">${w.w}</div><div class="wpn-why">${w.y}</div>
        ${w.miss?`<div class="miss-warn">MISSABLE - read the location carefully</div>`:""}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  else if(curSec==="folio"){
    h+=`<div class="sec">
      <div class="sec-hd" style="color:${color}">FOLIO UPGRADE PRIORITIES<div class="sec-line" style="background:linear-gradient(90deg,${color}40,transparent)"></div></div>
      <div class="info-box ib-pur" style="margin-bottom:12px">SP is earned from battles and World Intel (Party EXP). Unlock these in order - don't spread SP across everything early.</div>`;
    b.folio.forEach((tier,i)=>{
      h+=`<div class="folio-card">
        <div class="folio-hd"><div class="t-num">${i+1}</div>${tier.tier}</div>
        <div class="folio-body">${tier.items.map(it=>`<div class="f-item"><span class="f-dot">›</span><span>${it}</span></div>`).join("")}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  else if(curSec==="party"){
    h+=`<div class="sec">
      <div class="sec-hd" style="color:${color}">PARTY COMPOSITIONS<div class="sec-line" style="background:linear-gradient(90deg,${color}40,transparent)"></div></div>
      <div class="info-box ib-pur" style="margin-bottom:12px">Recommended team setups featuring ${b.name}. Party composition matters - these are optimized for ${b.name}'s specific strengths.</div>`;
    b.party.forEach(p=>{
      h+=`<div class="party-card">
        <div class="party-name">${p.n}</div>
        <div class="party-members">${p.m.map(([name,col])=>`<div class="pmember" style="background:${col}20;border-color:${col}60;color:${col}">${name}</div>`).join("")}</div>
        <div class="party-why">${p.w}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  else if(curSec==="tips"){
    h+=`<div class="sec">
      <div class="sec-hd" style="color:${color}">PRO TIPS<div class="sec-line" style="background:linear-gradient(90deg,${color}40,transparent)"></div></div>`;
    b.tips.forEach(t=>{h+=`<div class="tip-card">› ${t}</div>`;});
    h+=`</div>`;
  }

  document.getElementById("content").innerHTML=h;
  document.getElementById("content").scrollTop=0;
}

function setCh(id){curChar=id;render();}
document.querySelectorAll(".sec-tab").forEach(b=>b.addEventListener("click",()=>{curSec=b.dataset.s;render();}));
document.getElementById("theme-btn").addEventListener("click",()=>{
  light=!light;document.body.classList.toggle("light",light);
  document.getElementById("theme-btn").textContent=light?"\uD83C\uDF19":"\u2600\uFE0F";
});
render();
</script>
